<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Rewriter — Gemini AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 2rem;
      width: 100%;
      max-width: 800px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #1a1a1a;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.4rem;
    }

    textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 0.95rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    textarea:focus { border-color: #6c63ff; }

    select {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      font-size: 0.95rem;
      outline: none;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    select:focus { border-color: #6c63ff; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .field { margin-bottom: 1.25rem; }

    button {
      width: 100%;
      padding: 0.75rem;
      background: #6c63ff;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    button:hover { background: #574fd6; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .result-section {
      margin-top: 1.5rem;
      display: none;
    }
    .result-section.visible { display: block; }

    .result-box {
      background: #f0eeff;
      border: 1px solid #cfc8ff;
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.95rem;
      line-height: 1.6;
      white-space: pre-wrap;
      color: #1a1a1a;
      min-height: 80px;
    }

    .copy-btn {
      margin-top: 0.75rem;
      width: auto;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      background: #fff;
      color: #6c63ff;
      border: 1px solid #6c63ff;
      border-radius: 6px;
    }
    .copy-btn:hover { background: #f0eeff; }

    .error { color: #d32f2f; font-size: 0.875rem; margin-top: 0.5rem; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>✍️ Text Rewriter — Gemini AI</h1>

    <div class="field">
      <label for="inputText">Your text</label>
      <textarea id="inputText" rows="6" placeholder="Paste or type the text you want rewritten…"></textarea>
    </div>

    <div class="row">
      <div>
        <label for="tone">Tone</label>
        <select id="tone">
          <option value="">Default (improve clarity)</option>
          <option value="professional">Professional</option>
          <option value="casual">Casual</option>
          <option value="formal">Formal</option>
          <option value="friendly">Friendly</option>
          <option value="concise">Concise</option>
          <option value="persuasive">Persuasive</option>
          <option value="simple">Simple / plain language</option>
        </select>
      </div>
    </div>

    <button id="rewriteBtn" onclick="rewrite()">Rewrite</button>
    <div id="errorMsg" class="error"></div>

    <div class="result-section" id="resultSection">
      <label>Rewritten text</label>
      <div class="result-box" id="resultBox"></div>
      <button class="copy-btn" onclick="copyResult()">Copy</button>
    </div>
  </div>

  <script>
    async function rewrite() {
      const text = document.getElementById('inputText').value.trim();
      const tone = document.getElementById('tone').value;
      const btn = document.getElementById('rewriteBtn');
      const errorMsg = document.getElementById('errorMsg');
      const resultSection = document.getElementById('resultSection');
      const resultBox = document.getElementById('resultBox');

      errorMsg.textContent = '';

      if (!text) {
        errorMsg.textContent = 'Please enter some text first.';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Rewriting…';
      resultSection.classList.remove('visible');

      try {
        const res = await fetch('/rewrite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, tone }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Unknown error');
        resultBox.textContent = data.result;
        resultSection.classList.add('visible');
      } catch (err) {
        errorMsg.textContent = err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Rewrite';
      }
    }

    function copyResult() {
      const text = document.getElementById('resultBox').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
      });
    }

    document.getElementById('inputText').addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') rewrite();
    });
  </script>
</body>
</html>
